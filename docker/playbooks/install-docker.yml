---
# Instala Docker CE desde el repositorio oficial en Debian/Ubuntu.
#   ansible-playbook -i inventory.ini install-docker.yml
- name: Instalar Docker CE
  hosts: docker_hosts
  become: true
  vars:
    docker_users: []   # usuarios a anadir al grupo docker (equivale a root: usar con cuidado)
  tasks:
    - name: Dependencias base
      ansible.builtin.apt:
        name: [ca-certificates, curl, gnupg]
        state: present
        update_cache: true

    - name: Directorio de claves apt
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Clave GPG de Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Repositorio de Docker
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64','amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Instalar Docker Engine y plugins
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Servicio Docker habilitado
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Anadir usuarios al grupo docker (riesgo: equivale a root)
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"
      when: docker_users | length > 0
